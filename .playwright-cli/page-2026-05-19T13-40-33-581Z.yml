      - generic [ref=e457]:
        - heading "A few clean answers." [level=2] [ref=e458]
        - generic [ref=e459]:
          - article [ref=e460]:
            - heading "How is Dunlo different from Triggla or Churn Buster?" [level=3] [ref=e461]
            - paragraph [ref=e462]: "Dunlo is narrower: Stripe-first recovery, failure-code emails, AI founder escalation, and simple beta pricing instead of a broad lifecycle suite or a recovered-revenue cut."
          - article [ref=e463]:
            - heading "What is the AI escalation feature exactly?" [level=3] [ref=e464]
            - paragraph [ref=e465]: When a failed payment crosses your threshold, Dunlo pauses automation and drafts a short personal email from the founder with the Stripe context. You can review, regenerate, dismiss, or send it.
          - article [ref=e466]:
            - heading "Is my Stripe data safe?" [level=3] [ref=e467]
            - paragraph [ref=e468]: Dunlo uses Stripe data only to understand the failed payment context and recovery status. It does not need to move money, change charges, or store card details.
          - article [ref=e469]:
            - heading "Can I cancel anytime?" [level=3] [ref=e470]
            - paragraph [ref=e471]: Yes. The beta is free, and after billing starts you can cancel or downgrade without a long-term contract.
          - article [ref=e472]:
            - heading "How much setup is involved?" [level=3] [ref=e473]
            - paragraph [ref=e474]: Connect Stripe, review the default sequences, and add your email provider. Most teams can see their recovery benchmark in a few minutes.
          - article [ref=e475]:
            - heading "What happens during beta?" [level=3] [ref=e476]
            - paragraph [ref=e477]: The product is free during beta. Pricing is visible so you know the direction before Dunlo starts billing.
          - article [ref=e478]:
            - heading "Does Dunlo replace Stripe Smart Retries?" [level=3] [ref=e479]
            - paragraph [ref=e480]: No. Stripe can keep retrying cards. Dunlo handles the customer communication and founder escalation around those failures.
